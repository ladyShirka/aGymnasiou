<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ενότητα 7: Δημιουργώ με τον Κειμενογράφο</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --purple:       #7c3aed;
      --purple-light: #ede9fe;
      --purple-mid:   #a78bfa;
      --blue:         #3b6ef8;
      --dark:         #1e1b4b;
      --bg:           #f5f3ff;
      --white:        #ffffff;
      --text:         #1e293b;
      --muted:        #64748b;
      --border:       #ddd6fe;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #c4b5fd 1px, transparent 1px);
      background-size: 30px 30px;
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }

    /* TOP BAR */
    .topbar {
      position: relative;
      z-index: 20;
      background: linear-gradient(135deg, #1e1b4b 0%, #4c1d95 50%, #6d28d9 100%);
      padding: 0.9rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      box-shadow: 0 4px 24px rgba(109,40,217,0.35);
      flex-shrink: 0;
    }

    .back-btn {
      background: rgba(255,255,255,0.15);
      border: 1.5px solid rgba(255,255,255,0.25);
      color: white;
      padding: 0.4rem 1rem;
      border-radius: 50px;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 0.82rem;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: background 0.2s, transform 0.2s;
      white-space: nowrap;
    }
    .back-btn:hover { background: rgba(255,255,255,0.28); transform: translateX(-3px); }

    .topbar-info { color: white; min-width: 0; }
    .topbar-info .badge {
      font-size: 0.68rem;
      font-weight: 900;
      opacity: 0.75;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .topbar-info h1 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.05rem, 3vw, 1.45rem);
      line-height: 1.2;
    }

    /* TAB BAR */
    .tab-bar {
      position: relative;
      z-index: 10;
      background: var(--white);
      border-bottom: 2px solid var(--border);
      display: flex;
      padding: 0 1.5rem;
      box-shadow: 0 2px 12px rgba(124,58,237,0.08);
      flex-shrink: 0;
    }

    .tab-btn {
      position: relative;
      background: none;
      border: none;
      padding: 1rem 1.4rem 0.9rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 0.9rem;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.45rem;
      transition: color 0.2s;
      white-space: nowrap;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
    }
    .tab-btn:hover { color: var(--purple); }
    .tab-btn.active { color: var(--purple); border-bottom-color: var(--purple); }

    .tab-icon {
      font-size: 1.15rem;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .tab-btn:hover .tab-icon,
    .tab-btn.active .tab-icon { transform: scale(1.2); }

    .tab-pill {
      background: var(--purple-light);
      color: var(--purple);
      font-size: 0.65rem;
      font-weight: 900;
      padding: 0.15rem 0.5rem;
      border-radius: 50px;
      letter-spacing: 0.04em;
    }

    /* IFRAME PANES */
    .iframe-container {
      position: relative;
      z-index: 5;
      flex: 1;
      display: none;
      flex-direction: column;
    }
    .iframe-container.active { display: flex; }

    iframe {
      flex: 1;
      border: none;
      width: 100%;
      min-height: calc(100vh - 116px);
    }

    /* Loading overlay */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      z-index: 100;
      transition: opacity 0.4s ease;
    }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }

    .spinner {
      width: 52px; height: 52px;
      border: 5px solid var(--border);
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text { font-family: 'Fredoka One', cursive; font-size: 1.2rem; color: var(--purple); }
    .loading-sub  { font-size: 0.85rem; color: var(--muted); font-weight: 700; }

    @media (max-width: 480px) {
      .tab-btn { padding: 0.8rem 0.9rem 0.75rem; font-size: 0.8rem; }
      .tab-pill { display: none; }
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <a href="index.html" class="back-btn">← Πίσω</a>
    <div class="topbar-info">
      <div class="badge">Ενότητα 7 · LibreOffice Writer</div>
      <h1>✍️ Δημιουργώ με τον Κειμενογράφο</h1>
    </div>
  </div>

  <!-- TAB BAR -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tab1" onclick="switchTab(1)">
      <span class="tab-icon">🃏</span>
      Flash Cards
      <span class="tab-pill">Μελέτη</span>
    </button>
    <button class="tab-btn" id="tab2" onclick="switchTab(2)">
      <span class="tab-icon">🔗</span>
      Αντιστοίχιση
      <span class="tab-pill">Άσκηση</span>
    </button>
  </div>

  <!-- PANE 1: Flash Cards -->
  <div class="iframe-container active" id="pane1">
    <div class="loading-overlay" id="load1">
      <div class="spinner"></div>
      <div class="loading-text">🃏 Flash Cards</div>
      <div class="loading-sub">Φόρτωση δραστηριότητας...</div>
    </div>
    <iframe
      src="flashcards_libreoffice.html"
      title="Flash Cards – LibreOffice Writer"
      onload="hideLoader('load1')"
    ></iframe>
  </div>

  <!-- PANE 2: Αντιστοίχιση -->
  <div class="iframe-container" id="pane2">
    <div class="loading-overlay" id="load2">
      <div class="spinner"></div>
      <div class="loading-text">🔗 Αντιστοίχιση</div>
      <div class="loading-sub">Φόρτωση δραστηριότητας...</div>
    </div>
    <iframe
      src="antistichisi_libreoffice.html"
      title="Αντιστοίχιση – LibreOffice Writer"
      onload="hideLoader('load2')"
    ></iframe>
  </div>

  <script>
    function switchTab(n) {
      document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i + 1 === n);
      });
      document.querySelectorAll('.iframe-container').forEach((pane, i) => {
        pane.classList.toggle('active', i + 1 === n);
      });
    }

    function hideLoader(id) {
      const el = document.getElementById(id);
      if (el) el.classList.add('hidden');
    }
  </script>

</body>
</html>
